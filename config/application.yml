app:
  # 应用名称，用于日志、监控或服务标识。
  name: w-server

server:
  # 服务监听地址，默认监听所有网卡。
  host: 0.0.0.0
  # 服务监听端口。
  port: 3000

database:
  # 是否在应用启动时初始化 MySQL 连接。
  # 本地数据库尚未准备好时保持 false，配置完成后再改为 true。
  enabled: false
  # MySQL 服务地址。
  host: 127.0.0.1
  # MySQL 服务端口。
  port: 3306
  # MySQL 登录用户名。
  username: root
  # MySQL 登录密码。
  # 敏感信息建议通过部署环境变量覆盖，不要直接提交真实生产密码。
  password: ''
  # 业务数据库名称，对应 TypeORM 的 database 配置项。
  name: w_server
  # 数据库字符集，推荐使用 utf8mb4。
  charset: utf8mb4
  # 数据库时区配置。
  timezone: '+08:00'
  # 是否打印 SQL 日志。
  logging: false
  # 是否自动同步表结构。
  # 生产环境通常保持 false，避免误改数据库结构。
  synchronize: false
  # 是否自动加载 Nest 模块中注册的实体。
  autoLoadEntities: true

redis:
  # 是否在应用启动时初始化 Redis 连接。
  enabled: false
  # Redis 服务地址。
  host: 127.0.0.1
  # Redis 服务端口。
  port: 6379
  # Redis ACL 用户名，未启用 ACL 时可留空。
  username: ''
  # Redis 访问密码。
  # 敏感信息建议通过部署环境变量覆盖，不要直接提交真实生产密码。
  password: ''
  # Redis 逻辑库编号，从 0 开始。
  db: 0
  # Redis key 前缀，用于多应用共享实例时隔离数据。
  keyPrefix: ''
  # Redis 连接超时时间，单位毫秒。
  connectTimeout: 10000

auth:
  # Access Token 签名密钥。
  # 生产环境必须通过环境变量或独立配置覆盖为高强度随机字符串。
  accessTokenSecret: please-change-me-access-token-secret
  # Access Token 有效期，单位秒。
  accessTokenExpiresIn: 900
  # Refresh Token 签名密钥。
  # 生产环境必须通过环境变量或独立配置覆盖为高强度随机字符串。
  refreshTokenSecret: please-change-me-refresh-token-secret
  # Refresh Token 有效期，单位秒。
  refreshTokenExpiresIn: 604800
  # Token 签发方标识。
  issuer: w-server
  # Token 目标受众标识。
  audience: w-server-client
  captcha:
    # 是否启用登录验证码。
    enabled: true
    # 验证码有效期，单位秒。
    ttlSeconds: 120
    # 验证码字符长度。
    size: 4
    # SVG 验证码宽度。
    width: 120
    # SVG 验证码高度。
    height: 40
    # 干扰线数量。
    noise: 2
    # 过滤易混淆字符。
    ignoreChars: 0Oo1iIlL
    # SVG 背景色。
    background: '#f7f7f7'

file:
  # 单文件上传大小上限，单位字节。
  maxSize: 10485760
  # 允许浏览器直接预览的 MIME 类型列表。
  previewMimeTypes:
    - image/jpeg
    - image/png
    - image/webp
    - application/pdf
    - text/plain
  # 允许上传的 MIME 类型白名单。
  allowedMimeTypes:
    - image/jpeg
    - image/png
    - image/webp
    - application/pdf
    - text/plain
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document

minio:
  # 是否启用 MinIO 文件存储能力。
  enabled: false
  # MinIO 服务地址。
  endpoint: 127.0.0.1
  # MinIO 服务端口。
  port: 9000
  # 是否使用 HTTPS 连接 MinIO。
  useSSL: false
  # MinIO 访问账号。
  accessKey: minioadmin
  # MinIO 访问密钥。
  # 敏感信息建议通过部署环境变量覆盖，不要直接提交真实生产密钥。
  secretKey: minioadmin
  # 文件默认存储桶名称。
  bucket: w-server
