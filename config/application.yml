app:
  name: w-server

server:
  host: 0.0.0.0
  port: 3000

database:
  # 是否在应用启动时初始化 MySQL 连接。
  # 本地数据库尚未准备好时保持 false，配置完成后再改为 true。
  enabled: false
  # MySQL 5.7 服务地址。
  host: 127.0.0.1
  # MySQL 5.7 默认监听端口。
  port: 3306
  # 数据库登录用户名。
  username: root
  # 数据库登录密码。
  # 敏感信息不要直接提交到公共仓库，生产环境建议通过部署配置覆盖。
  password: ''
  # 业务库名称，对应 TypeORM 的 database 配置项。
  name: w_server
  # MySQL 5.7 建议使用 utf8mb4，避免字符集兼容问题。
  charset: utf8mb4
  # 数据库会话时区，按部署环境调整。
  timezone: '+08:00'
  # 是否打印 SQL 日志。
  logging: false
  # 是否自动同步表结构。
  # 生产环境通常保持 false，避免误修改数据库结构。
  synchronize: false
  # 是否自动加载 Nest 模块里注册的实体。
  autoLoadEntities: true
