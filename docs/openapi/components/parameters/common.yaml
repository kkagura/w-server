Id:
  name: id
  in: path
  required: true
  description: 数字型资源 ID。
  schema:
    type: integer
    format: int64
    minimum: 1
    example: 1

Page:
  name: page
  in: query
  required: false
  description: 页码，默认值为 1。
  schema:
    type: integer
    minimum: 1
    default: 1

PageSize:
  name: pageSize
  in: query
  required: false
  description: 每页条数，默认值为 10，最大值为 100。
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 10

ContentMode:
  name: mode
  in: query
  required: false
  description: 控制内联预览或强制下载行为。
  schema:
    type: string
    enum:
      - preview
      - download
    default: preview
